<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhanya Global Exports</title>

<style>
body {
  font-family: Arial;
  margin: 0;
}

nav {
  background: #1f5f2c;
  color: white;
  padding: 15px;
  text-align: center;
}

section {
  padding: 40px;
  text-align: center;
}

form {
  margin-top: 20px;
}

input, textarea {
  padding: 10px;
  margin: 10px;
  width: 250px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

button {
  padding: 12px 20px;
  background: #d4af37;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #b8962e;
}

#status {
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<nav>
<h2>Dhanya Global Exports</h2>
</nav>

<section>
<h2>Contact Us</h2>

<form id="contactForm">
<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>
<textarea id="message" placeholder="Your Requirement" required></textarea>

<button type="submit">Send Inquiry</button>
</form>

<p id="status"></p>
</section>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e){
  e.preventDefault();

  document.getElementById("status").innerText = "Sending...";

  try {
    const res = await fetch("https://dhanya-api.onrender.com/send", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      })
    });

    const data = await res.json();
    document.getElementById("status").innerText = data.message;

  } catch (error) {
    document.getElementById("status").innerText = "Error sending email ❌";
    console.log(error);
  }
});
</script>

</body>
</html>
