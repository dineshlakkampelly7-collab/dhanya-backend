<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dhanya Global Exports</title>

<meta name="description" content="Premium Agricultural Export Company from India">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

html{
scroll-padding-top:100px;
}

body{
font-family:'Poppins',sans-serif;
background:
linear-gradient(
to bottom,
#f8f8f8,
#eef3ed
);
color:#1f5f2c;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:fixed;
top:0;
left:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:rgba(7,25,12,0.78);
backdrop-filter:blur(14px);
-webkit-backdrop-filter:blur(14px);
z-index:1000;
box-shadow:0 8px 35px rgba(0,0,0,0.25);
border-bottom:1px solid rgba(255,255,255,.08);
transition:.4s;
}

.logo{
display:flex;
align-items:center;
gap:12px;
color:white;
font-size:22px;
font-weight:600;
}

.logo-icon{
color:#d4af37;
font-size:28px;
font-weight:700;
}

nav ul{
display:flex;
gap:35px;
list-style:none;
}

nav li{
color:white;
cursor:pointer;
transition:.3s;
font-size:15px;
font-weight:500;
}

nav li:hover{
color:#d4af37;
}

/* HERO */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:
linear-gradient(
to right,
rgba(0,0,0,.72),
rgba(0,0,0,.45)
),
linear-gradient(
to top,
rgba(0,0,0,.55),
transparent
);
z-index:1;
}

.hero-content{
position:relative;
z-index:2;
max-width:900px;
padding:20px;
animation:fadeUp 1.2s ease;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.hero h1{
font-size:72px;
line-height:1.1;
color:white;
font-weight:700;
margin-bottom:22px;
text-shadow:0 8px 30px rgba(0,0,0,.35);
}

.hero p{
font-size:21px;
color:#f5f5f5;
line-height:1.9;
max-width:760px;
margin:auto;
}

.hero-buttons{
margin-top:35px;
display:flex;
gap:18px;
justify-content:center;
flex-wrap:wrap;
}

.primary-btn{
background:linear-gradient(135deg,#d4af37,#b8860b);
color:white;
padding:15px 32px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.35s;
box-shadow:
0 10px 25px rgba(212,175,55,.35),
0 4px 12px rgba(0,0,0,.2);
}

.primary-btn:hover{
transform:translateY(-4px) scale(1.03);
background:linear-gradient(135deg,#e0bb45,#b8860b);
}

.secondary-btn{
background:transparent;
color:white;
padding:15px 32px;
border:2px solid white;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.secondary-btn:hover{
background:white;
color:#1f5f2c;
transform:translateY(-3px);
}

/* FLOAT INFO */

.info-strip{
margin-top:-60px;
position:relative;
z-index:5;
padding:0 20px;
}

.info-container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.info-box{
background:rgba(255,255,255,.92);
padding:30px 22px;
border-radius:18px;
text-align:center;
box-shadow:
0 12px 28px rgba(0,0,0,0.08),
0 5px 15px rgba(0,0,0,0.03);
transition:.45s;
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.5);
}

.info-box:hover{
transform:translateY(-12px) scale(1.02);
box-shadow:
0 22px 45px rgba(0,0,0,0.14),
0 8px 20px rgba(0,0,0,0.06);
}

.info-box h3{
font-size:18px;
margin-top:10px;
}

.info-box p{
margin-top:8px;
font-size:14px;
line-height:1.7;
}

/* SECTION */

.section{
padding:100px 20px;
}

.container{
max-width:1250px;
margin:auto;
}

.section-title{
text-align:center;
margin-bottom:60px;
}

.section-title h2{
font-size:48px;
margin-bottom:16px;
color:#16391f;
letter-spacing:-1px;
}

.section-title p{
max-width:760px;
margin:auto;
line-height:1.9;
color:#555;
font-size:17px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:35px;
}

.product-card{
background:rgba(255,255,255,.92);
border-radius:24px;
overflow:hidden;
box-shadow:
0 15px 35px rgba(0,0,0,0.08),
0 5px 15px rgba(0,0,0,0.04);
transition:.45s;
border:1px solid rgba(255,255,255,.4);
backdrop-filter:blur(8px);
}

.product-card:hover{
transform:translateY(-14px);
box-shadow:
0 22px 50px rgba(0,0,0,0.14),
0 8px 18px rgba(0,0,0,0.08);
}

.product-image{
position:relative;
overflow:hidden;
height:280px;
}

.product-image img{
width:100%;
height:100%;
object-fit:cover;
transition:transform .9s ease;
}

.product-card:hover .product-image img{
transform:scale(1.12);
}

.product-overlay{
position:absolute;
bottom:15px;
left:15px;
background:#d4af37;
color:white;
padding:8px 16px;
border-radius:30px;
font-size:13px;
font-weight:600;
}

.product-content{
padding:28px;
}

.product-content h3{
font-size:28px;
margin-bottom:12px;
}

.product-content p{
line-height:1.8;
color:#555;
margin-bottom:22px;
}

.product-btn{
display:inline-block;
padding:12px 24px;
background:#1f5f2c;
color:white;
border:none;
border-radius:8px;
text-decoration:none;
transition:.3s;
cursor:pointer;
font-size:15px;
}

.product-btn:hover{
background:#2c7a3b;
transform:translateY(-3px);
}

/* STATS */

.stats-section{
background:white;
padding:90px 20px;
}

.stats-grid{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.stat-card{
background:rgba(255,255,255,.88);
backdrop-filter:blur(10px);
padding:38px;
border-radius:22px;
text-align:center;
box-shadow:
0 12px 30px rgba(0,0,0,0.08),
0 5px 15px rgba(0,0,0,0.03);
transition:.45s;
border:1px solid rgba(255,255,255,.5);
}

.stat-card:hover{
transform:translateY(-12px);
box-shadow:
0 22px 50px rgba(0,0,0,0.15),
0 8px 18px rgba(0,0,0,0.05);
}

.stat-card h2{
font-size:42px;
color:#1f5f2c;
margin-bottom:10px;
}

/* VIDEO */

.video-section{
background:white;
}

.video-wrapper{
max-width:1100px;
margin:auto;
overflow:hidden;
border-radius:22px;
box-shadow:0 12px 30px rgba(0,0,0,0.12);
}

.video-wrapper video{
width:100%;
height:600px;
object-fit:cover;
outline:none;
}

/* ADVANTAGE */

.advantage-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.adv-card{
background:rgba(255,255,255,.88);
backdrop-filter:blur(10px);
padding:38px 30px;
border-radius:22px;
text-align:center;
box-shadow:
0 12px 30px rgba(0,0,0,0.08),
0 5px 15px rgba(0,0,0,0.03);
transition:.45s;
border:1px solid rgba(255,255,255,.5);
}

.adv-card:hover{
transform:translateY(-12px);
box-shadow:
0 22px 50px rgba(0,0,0,0.14),
0 8px 18px rgba(0,0,0,0.05);
}

.adv-icon{
font-size:42px;
margin-bottom:18px;
}

/* MARKET */

.market-strip{
background:#16391f;
padding:70px 20px;
color:white;
text-align:center;
}

.market-strip h2{
letter-spacing:.5px;
}

.market-flags{
margin-top:35px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.market{
background:rgba(255,255,255,.1);
padding:18px 24px;
border-radius:12px;
backdrop-filter:blur(5px);
font-size:18px;
}

/* FOUNDER */

.founder-premium{
background:linear-gradient(
135deg,
rgba(255,255,255,.95),
rgba(248,248,248,.92)
);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.5);
border-radius:24px;
box-shadow:
0 15px 40px rgba(0,0,0,0.08),
0 5px 15px rgba(0,0,0,0.04);
}

/* CONTACT */

.contact{
background:#16391f;
color:white;
padding:90px 20px;
}

.contact-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:40px;
max-width:1200px;
margin:auto;
}

.contact-card{
background:rgba(255,255,255,0.10);
backdrop-filter:blur(12px);
padding:38px;
border-radius:22px;
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 10px 25px rgba(0,0,0,0.15);
}

/* FOOTER */

footer{
background:
linear-gradient(
135deg,
#0c0c0c,
#161616
);
color:white;
padding:50px 20px;
text-align:center;
}

footer h3{
letter-spacing:.5px;
}

.certifications{
margin-top:25px;
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.certifications img{
height:55px;
background:white;
padding:8px;
border-radius:10px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:22px;
right:22px;
background:#25D366;
width:65px;
height:65px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:30px;
text-decoration:none;
color:white;
z-index:999;
box-shadow:
0 12px 30px rgba(37,211,102,.45),
0 6px 15px rgba(0,0,0,.2);
animation:floatWhats 2s infinite ease-in-out;
}

@keyframes floatWhats{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

/* MOBILE */

@media(max-width:768px){

nav{
padding:16px 20px;
flex-direction:column;
gap:15px;
}

nav ul{
gap:18px;
flex-wrap:wrap;
justify-content:center;
}

.hero h1{
font-size:46px;
}

.hero p{
font-size:17px;
}

.section-title h2{
font-size:36px;
}

.video-wrapper video{
height:320px;
}

}

</style>

</head>

<body>

</body>

</html>
